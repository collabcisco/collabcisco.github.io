<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago Seguro</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}


body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:520px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    overflow:hidden;
}

/* LOGO */
.logo-container{
    text-align:center;
    padding:25px 25px 0 25px;
}

.logo-container img{
    max-height:60px;
    max-width:200px;
    object-fit:contain;
}

/* HEADER */
.header{
    padding:15px 25px 10px 25px;
    text-align:center;
}

.header h1{
    font-size:22px;
    color:#222;
}

/* RESUMEN */
.summary{
    padding:20px 25px;
    background:#fafafa;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.amount{
    font-size:30px;
    font-weight:bold;
    text-align:center;
    margin-top:10px;
}

/* FORM */
.form{
    padding:25px;
}

.field{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    color:#444;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0066ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:.95;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

/* MESSAGE */
.message{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    text-align:center;
}

.success{
    background:#e8f5e9;
    color:#2e7d32;
}

.error{
    background:#ffebee;
    color:#c62828;
}

.pending{
    background:#fff8e1;
    color:#ef6c00;
}

.small{
    font-size:12px;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-container">
        <img id="logo" src="logo.png" alt="Logo">
    </div>

    <div class="header">
        <h1>Pago Seguro</h1>
    </div>

    <div class="summary">
        <div class="row">
            <span>Orden</span>
            <strong id="orderId"></strong>
        </div>

        <div class="amount" id="amount"></div>
    </div>

    <div class="form">

        <div class="field">
            <label>Nombre del titular</label>
            <input type="text" id="holderName" placeholder="Como aparece en la tarjeta">
        </div>

        <div class="field">
            <label>Número de tarjeta</label>
            <input type="text" id="cardNumber" maxlength="19" placeholder="4111 1111 1111 1111">
        </div>

        <div class="grid">
            <div class="field">
                <label>Vencimiento</label>
                <input type="text" id="expiry" placeholder="MM/AA">
            </div>

            <div class="field">
                <label>CVV</label>
                <input type="password" id="cvv" maxlength="4" placeholder="123">
            </div>
        </div>

        <button id="payBtn">Pagar ahora</button>

        <div id="message" class="message"></div>

    </div>
</div>

<script>

const WEBHOOK_URL = "https://hooks.us.webexconnect.io/events/4E9NB42Q5R";

const params = new URLSearchParams(window.location.search);

const orderId = params.get("orden") || "ORD-DEMO-001";
const amount = params.get("monto") || "0.00";
const customer = params.get("cliente") || "Cliente Demo";


document.getElementById("orderId").innerText = orderId;
document.getElementById("amount").innerText = "$" + amount;


/* FORMAT CARD */
document.getElementById("cardNumber").addEventListener("input", function(e){
    let value = e.target.value.replace(/\D/g,'');
    value = value.match(/.{1,4}/g)?.join(' ') || '';
    e.target.value = value;
});

function showMessage(type, html){
    const box = document.getElementById("message");
    box.className = "message " + type;
    box.style.display = "block";
    box.innerHTML = html;
}

function transactionId(){
    return "AUTH-" + Date.now();
}

document.getElementById("payBtn").addEventListener("click", async () => {

    const btn = document.getElementById("payBtn");

    const name = document.getElementById("holderName").value.trim();
    const card = document.getElementById("cardNumber").value.replace(/\s/g,'');
    const expiry = document.getElementById("expiry").value.trim();
    const cvv = document.getElementById("cvv").value.trim();

    if(!name || !card || !expiry || !cvv){
        showMessage("error","Completa todos los campos.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Procesando...";

    await new Promise(r => setTimeout(r, 2000));

    let status = "APPROVED";

    if(card === "4000000000000002") status = "DECLINED";
    if(card === "4000000000009995") status = "INSUFFICIENT_FUNDS";
    if(card === "4000000000009987") status = "PENDING";

    const payload = {
        transactionId: transactionId(),
        orderId,
        amount,
        customer,
        cardLast4: card.slice(-4),
        status,
        timestamp: new Date().toISOString()
    };

    if(status === "APPROVED"){
        try{
            await fetch(WEBHOOK_URL,{
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body:JSON.stringify(payload)
            });
        }catch(e){
            console.error(e);
        }

        showMessage("success",`
            <h3>✅ Pago aprobado</h3>
            <p>Orden: ${orderId}</p>
            <div class="small">Transacción enviada al sistema</div>
        `);
    }

    if(status === "DECLINED"){
        showMessage("error","❌ Pago rechazado");
    }

    if(status === "INSUFFICIENT_FUNDS"){
        showMessage("error","❌ Fondos insuficientes");
    }

    if(status === "PENDING"){
        showMessage("pending","⏳ Pago en validación");
    }

    btn.disabled = false;
    btn.innerText = "Pagar ahora";
});

</script>

</body>
</html>
