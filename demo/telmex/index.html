<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosko Telmex - Llamada</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0057b8, #00a3e0);
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.container {
  max-width: 800px;
  padding: 20px;
}

h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

p {
  font-size: 1.4rem;
  margin-bottom: 40px;
  opacity: 0.9;
}

button {
  font-size: 2rem;
  padding: 25px 70px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #0057b8;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  transition: transform 0.2s ease;
}

button:hover {
  transform: scale(1.05);
}

.status {
  margin-top: 30px;
  font-size: 1.2rem;
  min-height: 30px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Centro de Atención Telmex</h1>
  <p>Presiona el botón para hablar con un asesor</p>

  <button onclick="llamar()">📞 Llamar Asesor</button>

  <div class="status" id="status"></div>
</div>

<script>
const NUMERO = "+525590886005";

function llamar() {
  document.getElementById("status").innerText =
    "Abriendo marcador de llamadas...";

  // abre dialer del sistema (Webex puede interceptar si es default)
  window.location.href = `tel:${NUMERO}`;
}
</script>

</body>
</html>
