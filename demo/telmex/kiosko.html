<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asistencia Telmex</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans&display=swap');

    body {
      font-family: 'Open Sans', Arial, sans-serif;
      background: linear-gradient(135deg, #e0f0ff, #ffffff);
      margin: 0;
      padding: 30px 20px;
      color: #2c3e50;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 900px;
      width: 100%;
    }
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }
    .logo-container img {
      height: 60px;
      object-fit: contain;
    }
    header h1 {
      font-family: 'Montserrat', sans-serif;
      color: #004a99;
      font-weight: 800;
      font-size: 3rem;
      margin: 0;
      letter-spacing: 1.2px;
      text-shadow: 1px 1px 3px rgba(0, 74, 153, 0.3);
      line-height: 1.2;
    }
    header h1 span {
      display: block;
      font-size: 2.2rem;
      font-weight: 700;
      margin-top: 6px;
    }
    main {
      max-width: 1600px;
      width: 100%;
    }
    .content-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      justify-content: center;
    }
    #consultas {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
      text-align: left;
    }
    .consulta-item {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 74, 153, 0.1);
      padding: 25px 30px;
      transition: transform 0.3s ease;
      border-left: 6px solid #0078d7;
    }
    .consulta-item:hover {
      transform: translateY(-5px);
    }
    .consulta-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: #005aab;
      margin-bottom: 15px;
      border-bottom: 2px solid #0078d7;
      padding-bottom: 6px;
    }
    .instrucciones {
      font-size: 1.4rem;
      line-height: 1.6;
      color: #34495e;
      font-weight: 500;
    }
    .instrucciones ul {
      padding-left: 20px;
      margin: 0;
    }
    .error-message {
      color: #d93025;
      text-align: center;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .gif-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 280px;
    }
    .gif-container img {
      width: 200px;
      height: auto;
    }
    .btn-asistencia {
      margin-top: 15px;
      background-color: #26A69A;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      transition: 0.2s;
    }
    .btn-asistencia:hover {
      background-color: #1f8f85;
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-container">
      <img src="webex.png" alt="Cisco Webex Logo" />
      <img src="ciscoconnect.png" alt="Cisco Connect Logo" />
    </div>
    <h1>
      Telmex
      <span>Kiosko</span>
    </h1>
  </header>

  <main>
    <div class="content-container">
      <div id="consultas">
        <p>Cargando consultas e instrucciones...</p>
      </div>

      <div class="gif-container">
        <img src="RobotSaludando.gif" alt="Robot Saludando" />
        <button class="btn-asistencia" onclick="solicitarAsistencia()">
          Hazme una Pregunta
        </button>
      </div>
    </div>
  </main>

  <script>
    const apiURL = 'https://68cc4bf9716562cf50772e08.mockapi.io/executiveroom';
    let lastData = ""; // Variable para evitar parpadeos

    async function cargarConsultas() {
      try {
        const response = await fetch(apiURL);
        if (!response.ok) throw new Error('Error al obtener los datos');

        const datos = await response.json();
        const datosString = JSON.stringify(datos);

        // Solo actualizamos el DOM si los datos son diferentes a la última carga
        if (datosString !== lastData) {
          lastData = datosString;
          const contenedor = document.getElementById('consultas');
          contenedor.innerHTML = '';

          if (datos.length === 0) {
            contenedor.innerHTML = '<p class="error-message">No hay consultas disponibles en este momento.</p>';
          } else {
            datos.forEach(item => {
              const div = document.createElement('div');
              div.classList.add('consulta-item');

              const instruccionesTexto = String(item.Instrucciones || '');
              const instruccionesArray = instruccionesTexto.split('. ').map(s => s.trim()).filter(Boolean);
              const instruccionesHTML = instruccionesArray.length
                ? '<ul><li>' + instruccionesArray.join('</li><li>') + '</li></ul>'
                : '<p>No hay instrucciones.</p>';

              div.innerHTML = `
                <div class="consulta-title">Consulta:</div>
                <div class="instrucciones">${item.Consulta || 'N/A'}</div>
                <hr style="margin: 15px 0; border-top: 1px solid #e1e8f0;">
                <div class="consulta-title">Respuesta:</div>
                <div class="instrucciones">${instruccionesHTML}</div>
              `;
              contenedor.appendChild(div);
            });
          }
        }
      } catch (error) {
        console.error("Error al actualizar:", error);
      } finally {
        // Llama a la función nuevamente después de 5 segundos, asegurando estabilidad
        setTimeout(cargarConsultas, 5000);
      }
    }

    // Iniciar la primera carga
    cargarConsultas();

    function solicitarAsistencia() {
      window.open("tel:4000");
    }
  </script>

</body>
</html>
