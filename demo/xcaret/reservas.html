<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Xcaret</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%; /* Alineamos el formulario hacia la izquierda */
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: left;
            color: #006f56;
            display: inline-block;
            margin-left: 10px;
            font-size: 28px;
        }
        .logo-container {
            display: inline-block;
            margin-right: 10px;
        }
        .logo-container img {
            max-width: 100px; /* Tamaño reducido del logo */
            vertical-align: middle;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #006f56;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004d3f;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="Logo Xcaret">
        </div>
        <h1>Reserva tu visita a Xcaret</h1>
        <form action="#" method="POST">
            <label for="name">Nombre Completo:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="date">Fecha de la Visita:</label>
            <input type="date" id="date" name="date" required>

            <label for="people">Número de Personas:</label>
            <input type="number" id="people" name="people" min="1" required>

            <label for="attraction">Atracción Elegida:</label>
            <select id="attraction" name="attraction" required>
                <option value="parque_xcaret">Parque Xcaret</option>
                <option value="parque_xel_ha">Parque Xel-Há</option>
                <option value="parque_xplor">Parque Xplor</option>
                <option value="parque_xenses">Parque Xenses</option>
                <option value="xoximilco">Xoximilco</option>
            </select>

            <label for="comments">Comentarios adicionales (opcional):</label>
            <textarea id="comments" name="comments" rows="4"></textarea>

            <button type="submit">Realizar Reserva</button>
        </form>
    </div>

</body>
</html>
